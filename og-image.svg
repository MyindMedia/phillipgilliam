<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="55%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
    <pattern id="grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="rgba(255,255,255,0.012)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- top eyebrow -->
  <text x="80" y="120"
        font-family="'Courier New', monospace"
        font-size="22"
        letter-spacing="6"
        fill="#dc2626">THE JOHN TALION MYSTERIES</text>

  <!-- main title -->
  <text x="80" y="240"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="86"
        font-weight="700"
        fill="#f2ecea">Justice is optional.</text>
  <text x="80" y="340"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="86"
        font-style="italic"
        fill="#dc2626">Vengeance</text>
  <text x="540" y="340"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="86"
        font-weight="700"
        fill="#f2ecea">never sleeps.</text>

  <!-- author byline -->
  <line x1="80" y1="430" x2="160" y2="430" stroke="#b91c1c" stroke-width="3"/>
  <text x="180" y="438"
        font-family="'Courier New', monospace"
        font-size="22"
        letter-spacing="4"
        fill="#bdb3b0">PHILLIP GILLIAM</text>

  <!-- bottom row -->
  <text x="80" y="560"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="28"
        font-style="italic"
        fill="#bdb3b0">Hard Baltimore noir. Two novels out. A third on the way.</text>

  <!-- corner P mark -->
  <circle cx="1090" cy="100" r="42" fill="#0a0a0b" stroke="#b91c1c" stroke-width="2"/>
  <text x="1090" y="118"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="48"
        font-weight="700"
        fill="#f2ecea">P</text>
  <circle cx="1109" cy="116" r="3" fill="#b91c1c"/>
</svg>
